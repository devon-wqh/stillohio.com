    .joystick-left { left: 6vw; }
    .joystick-right { right: 6vw; }
    .joystick-knob { position: absolute; top: 50%; left: 50%; width: 52px; height: 52px; margin: -26px 0 0 -26px; border-radius: 50%; background: rgba(192,168,112,0.35); border: 1px solid rgba(224,200,150,0.5); pointer-events: none; }

    const TREE_OFFSETS = [[-28,-28],[-38,12],[-22,42],[32,-32],[42,18],[26,46],[-46,2],[46,-12],[-32,28],[36,-46],[-18,-44],[16,36],[-44,38],[22,-18],[-12,50],[48,40],[-50,-20],[38,50],[-68,18],[70,-25],[-55,65],[62,-58],[82,14],[-80,-18],[-64,-64],[66,68],[-92,32],[94,-34],[-38,88],[40,-88],[-76,52],[74,-54],[-96,-12],[98,8],[-16,-94],[18,92],[-48,98],[50,-96],[-86,74],[88,-72],[8,-78],[-10,80],[-100,46],[100,-44],[-72,-82],[72,80],[-58,-100],[60,98]];
