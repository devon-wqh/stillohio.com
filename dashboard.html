<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Dashboard — Still Ohio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body class="dash">
  <header class="dash-header">
    <div class="dash-brand">
      <img src="images/Still_Ohio_TT.png" alt="Still Ohio" />
      <span>Team Dashboard</span>
    </div>
    <div class="dash-user" id="dash-user"></div>
  </header>

  <nav class="dash-tabs" id="dash-tabs">
    <button class="dash-tab active" data-tab="overview">Overview</button>
    <button class="dash-tab" data-tab="screenings">Screenings</button>
    <button class="dash-tab" data-tab="photos">Photos</button>
    <button class="dash-tab" data-tab="emails">Email list</button>
    <button class="dash-tab" data-tab="map">Map</button>
  </nav>

  <main class="dash-main">
    <!-- Overview -->
    <section class="dash-section active" id="tab-overview">
      <div class="stat-grid" id="stat-grid"></div>
    </section>

    <!-- Screenings -->
    <section class="dash-section" id="tab-screenings">
      <div class="section-head">
        <h2>Screenings</h2>
        <button class="button" id="new-screening-btn" type="button">+ New screening</button>
      </div>
      <div id="screenings-admin-list"></div>
    </section>

    <!-- Photos -->
    <section class="dash-section" id="tab-photos">
      <div class="section-head"><h2>Photo archive</h2></div>
      <label class="field">
        <span>Screening</span>
        <select id="photo-screening-select"></select>
      </label>
      <div class="photo-admin-add">
        <label class="field">
          <span>Add a photo by link (image URL)</span>
          <input type="url" id="photo-url-input" placeholder="https://…/photo.jpg" />
        </label>
        <label class="field">
          <span>Caption (optional)</span>
          <input type="text" id="photo-caption-input" />
        </label>
        <button class="button" id="add-photo-link-btn" type="button">Add link</button>
      </div>
      <div class="photo-admin-upload">
        <label class="field">
          <span>Or upload a file</span>
          <input type="file" id="photo-file-input" accept="image/*" />
        </label>
        <button class="button" id="upload-photo-btn" type="button">Upload</button>
        <p class="hint" id="upload-hint"></p>
      </div>
      <div id="photo-admin-list" class="photo-admin-grid"></div>
    </section>

    <!-- Emails -->
    <section class="dash-section" id="tab-emails">
      <div class="section-head">
        <h2>Email list</h2>
        <button class="button" id="export-emails-btn" type="button">Export CSV</button>
      </div>
      <div class="table-wrap"><table class="dash-table" id="emails-table"></table></div>
    </section>

    <!-- Map -->
    <section class="dash-section" id="tab-map">
      <div class="section-head"><h2>Screenings map</h2></div>
      <div id="dash-map"></div>
    </section>
  </main>

  <!-- Screening editor modal -->
  <div class="modal-overlay" id="screening-modal" hidden>
    <div class="modal modal-wide" role="dialog" aria-modal="true">
      <button class="modal-close" id="screening-modal-close" type="button" aria-label="Close">&times;</button>
      <h2 id="screening-modal-title">New screening</h2>
      <form class="modal-form" id="screening-form">
        <input type="hidden" name="id" />
        <div class="form-grid">
          <label class="field"><span>Date label <b>*</b></span>
            <input type="text" name="display_date" placeholder="September 11, 2026" required></label>
          <label class="field"><span>Sort date (for order/map)</span>
            <input type="date" name="sort_date"></label>
          <label class="field"><span>Time</span>
            <input type="text" name="time" placeholder="7:00 PM"></label>
          <label class="field"><span>Town <b>*</b></span>
            <input type="text" name="town" placeholder="Columbus, Ohio" required></label>
          <label class="field field-wide"><span>Venue / detail line</span>
            <input type="text" name="venue" placeholder="Venue name · Festival"></label>
          <label class="field"><span>Badge</span>
            <input type="text" name="badge" placeholder="World Premiere"></label>
          <label class="field"><span>Status</span>
            <select name="status"><option value="upcoming">Upcoming</option><option value="past">Past</option></select></label>
          <label class="field"><span>Latitude</span>
            <input type="text" name="lat" placeholder="40.4173"></label>
          <label class="field"><span>Longitude</span>
            <input type="text" name="lng" placeholder="-82.9071"></label>
          <label class="field"><span>Button type</span>
            <select name="cta_type"><option value="updates">Keep me updated</option><option value="tickets">Get tickets</option><option value="none">No button</option></select></label>
          <label class="field field-wide"><span>Ticket URL (if Get tickets)</span>
            <input type="url" name="ticket_url" placeholder="https://…"></label>
          <label class="field"><span>Tickets sold</span>
            <input type="number" name="tickets_sold" min="0" placeholder="0"></label>
          <label class="field"><span>Gross ($)</span>
            <input type="number" name="gross_dollars" min="0" step="0.01" placeholder="0.00"></label>
        </div>
        <div class="form-actions">
          <button type="submit" class="button">Save</button>
          <button type="button" class="button button-danger" id="delete-screening-btn" hidden>Delete</button>
          <p class="modal-status" id="screening-form-status" aria-live="polite"></p>
        </div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="dashboard.js" defer></script>
</body>
</html>
