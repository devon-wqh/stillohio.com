<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ohio Screening — Still Ohio</title>
  <meta name="description" content="Still Ohio screening in Ohio, September 18, 2026. Details to be announced." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <p class="eyebrow">Screening</p>
    <h1>September 18, 2026</h1>
    <p class="town">Ohio</p>
    <p class="venue">Details to be announced.</p>

    <div class="button-row">
      <button class="button" id="keep-updated-btn" type="button" data-event="screening-5">Keep me updated</button>
    </div>
    <a class="text-link" href="screenings.html">← All screenings</a>
  </main>

  <div class="modal-overlay" id="keep-updated-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" type="button" aria-label="Close">&times;</button>
      <h2 id="modal-title">Keep me updated</h2>
      <p class="modal-copy">We'll let you know as soon as details are announced.</p>
      <form class="modal-form" id="keep-updated-form">
        <label>Name <span class="req">*</span>
          <input type="text" name="name" required>
        </label>
        <label>Email <span class="req">*</span>
          <input type="email" name="email" required>
        </label>
        <label>Zip code <span class="req">*</span>
          <input type="text" name="zip" required inputmode="numeric" pattern="[0-9]{5}">
        </label>
        <label>Phone <span class="optional">(optional)</span>
          <input type="tel" name="phone">
        </label>
        <button type="submit" class="button">Submit</button>
        <p class="modal-status" id="modal-status" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="menu.js" defer></script>
  <script src="keep-updated-modal.js" defer></script>
</body>
</html>
